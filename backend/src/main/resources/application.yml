spring:
  application:
    name: memoris-os
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/memoris_os}
    username: ${DATABASE_USERNAME:memoris}
    password: ${DATABASE_PASSWORD:memoris}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
  ai:
    openai:
      api-key: ${OPENAI_API_KEY:}

server:
  port: ${PORT:8080}

app:
  demo:
    seed-enabled: ${DEMO_SEED_ENABLED:false}
  ai:
    provider: ${AI_PROVIDER:local}
    max-context-chars: ${AI_MAX_CONTEXT_CHARS:6000}
    gemini:
      base-url: ${GEMINI_BASE_URL:https://generativelanguage.googleapis.com/v1beta}
      model: ${GEMINI_MODEL:gemini-3.5-flash}
      api-key: ${GEMINI_API_KEY:}
      max-output-tokens: ${GEMINI_MAX_OUTPUT_TOKENS:900}
  jwt:
    issuer: memoris-os
    secret: ${JWT_SECRET:change-me-to-a-very-long-production-secret-with-64-plus-chars}
    expires-minutes: ${JWT_EXPIRES_MINUTES:720}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173}
  uploads:
    directory: ${UPLOAD_DIR:./uploads}

logging:
  level:
    org.springframework.security: INFO
