spring:
  datasource:
    url: jdbc:h2:mem:memoris;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
  flyway:
    enabled: false
  h2:
    console:
      enabled: true

app:
  cors:
    allowed-origins: http://localhost:5173,http://127.0.0.1:5173
